name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
    paths:
      - 'Dockerfile'
      - 'docker-bake.hcl'
      - 'nginx.conf'
      - 'conf.d/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: dev
            platforms: linux/amd64
            push: false
          - target: ci
            platforms: linux/amd64,linux/arm64
            push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          buildkitd-flags: --debug

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/nginx
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/bake-action@v4
        with:
          targets: ${{ matrix.target }}
          push: ${{ matrix.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max

      - name: Generate SBOM
        if: matrix.push
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.tags && fromJson(steps.meta.outputs.tags)[0] || 'nginx:dev' }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.target }}.json

      - name: Upload SBOM
        if: matrix.push
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: sbom-*.json
          retention-days: 30

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags && fromJson(steps.meta.outputs.tags)[0] || 'nginx:dev' }}
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Install Cosign
        if: matrix.push
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        if: matrix.push
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | head -1)
          echo "${{ secrets.COSIGN_KEY }}" > cosign.key
          cosign sign --key cosign.key --yes "$IMAGE_TAG"
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      - name: Verify Cosign signature
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | head -1)
          cosign verify --key "${{ vars.COSIGN_PUBLIC_KEY }}" "$IMAGE_TAG" || true

  test:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: nginx:test
          cache-from: type=gha

      - name: Test container
        run: |
          docker run --rm -d -p 8080:80 --name test-nginx nginx:test
          sleep 3
          curl -f http://localhost:8080/ || exit 1
          docker stop test-nginx

      - name: Check nginx configuration
        run: |
          docker run --rm nginx:test nginx -t

      - name: Inspect image
        run: |
          docker run --rm nginx:test sh -c 'nginx -v && echo "Modules:"; nginx -V 2>&1 | grep modules' || true
