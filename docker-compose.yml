name: nginx-app

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NGINX_VERSION: "1.26.0"
      cache_from:
        - type=registry,ref=type=local,dest=/tmp/buildx-cache
      no_cache: false
    image: nginx:custom-${NGINX_VERSION:-latest}
    container_name: nginx-web
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGTERM

    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"

    volumes:
      # Configuration (read-only)
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./html:/usr/share/nginx/html:ro

      # Data volumes
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx

    environment:
      TZ: UTC
      NGINX_VERSION: ${NGINX_VERSION:-1.26.0}

    networks:
      - frontend

    healthcheck:
      test:
        - CMD-SHELL
        - "kill -0 $(cat /run/nginx.pid) 2>/dev/null || exit 1"
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      nproc:
        soft: 32768
        hard: 32768

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '1'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=nginx"

volumes:
  nginx-cache:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  nginx-logs:
    driver: local

networks:
  frontend:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-nginx
