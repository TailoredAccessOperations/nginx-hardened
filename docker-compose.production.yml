# =============================================================================
# PRODUCTION COMPOSE - Security-Hardened nginx Deployment
# =============================================================================
# Usage:
#   docker compose -f docker-compose.production.yml up -d
#   docker compose -f docker-compose.production.yml down
#   docker compose -f docker-compose.production.yml run --rm nginx nginx -t
#
# Security Features:
#   - Read-only root filesystem (with tmpfs overrides)
#   - Dropped ALL capabilities
#   - Non-root user (distroless nonroot, UID 65534)
#   - No new privileges
#   - Health checks with liveness/readiness probes
#   - Resource limits (CPU/memory)
#   - JSON logging with rotation
#   - Isolated network
#   - No privileged ports exposed to host
# =============================================================================

name: nginx-production

services:
  nginx:
    # Use the hardened Dockerfile for production
    build:
      context: .
      dockerfile: Dockerfile.hardened
      args:
        NGINX_VERSION: "1.26.0"
      # Enable BuildKit cache for faster rebuilds
      cache_from:
        - type=local,src=/tmp/buildx-cache
      no_cache: false
    image: nginx:production-1.26.0
    container_name: nginx-production
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGTERM

    # ---------------------------------------------------------------------
    # NETWORK - Bind to localhost only for production security
    # ---------------------------------------------------------------------
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"

    networks:
      - nginx-prod-network

    # ---------------------------------------------------------------------
    # VOLUMES - Read-only configs, tmpfs for runtime
    # ---------------------------------------------------------------------
    volumes:
      # Configuration (READ-ONLY from host)
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./html:/usr/share/nginx/html:ro

      # Temporary filesystems - noexec, nosuid, nodev for security
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 64m
          mode: 1777

      - type: tmpfs
        target: /var/cache/nginx
        tmpfs:
          size: 256m
          mode: 493

      - type: tmpfs
        target: /var/log/nginx
        tmpfs:
          size: 128m
          mode: 493

      - type: tmpfs
        target: /run
        tmpfs:
          size: 10m
          mode: 493

    # ---------------------------------------------------------------------
    # ENVIRONMENT
    # ---------------------------------------------------------------------
    environment:
      TZ: UTC
      NGINX_VERSION: "1.26.0"

    # ---------------------------------------------------------------------
    # HEALTH CHECKS - Critical for production orchestration
    # ---------------------------------------------------------------------
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

    # ---------------------------------------------------------------------
    # SECURITY - Defense in depth
    # ---------------------------------------------------------------------
    # Prevent privilege escalation
    security_opt:
      - no-new-privileges:true

    # Drop ALL capabilities (required for distroless)
    cap_drop:
      - ALL

    # File descriptor and process limits
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      nproc:
        soft: 32768
        hard: 32768

    # ---------------------------------------------------------------------
    # READ-ONLY ROOT FILESYSTEM - Except tmpfs mounts above
    # ---------------------------------------------------------------------
    read_only: true

    # ---------------------------------------------------------------------
    # RESOURCES - Limits prevent resource exhaustion
    # ---------------------------------------------------------------------
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '1'
          memory: 256M

    # ---------------------------------------------------------------------
    # LOGGING - JSON format with rotation
    # ---------------------------------------------------------------------
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service=nginx,env=production"

    # ---------------------------------------------------------------------
    # ISOLATED NETWORK
    # ---------------------------------------------------------------------

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  nginx-prod-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-nginx-production
      # Disable inter-container communication for isolation
      com.docker.network.bridge.enable_icc: "false"
      # Enable IP masquerading
      com.docker.network.bridge.enable_ip_masquerade: "true"

# =============================================================================
# VOLUMES - Named volumes for persistence (if needed)
# =============================================================================
volumes:
  nginx-cache:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  nginx-logs:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs